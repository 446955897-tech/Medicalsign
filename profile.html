<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إعدادات الحساب</title>

<style>
body {
  background-color: #eef2f7;
  font-family: Arial;
  color: #2c3e50;
  direction: rtl;
  margin: 0;
}

h1 {
  text-align: center;
  color: #2980b9;
  margin-top: 30px;
}

.account-settings {
  background-color: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(41, 128, 185, 0.1);
  width: 80%;
  max-width: 500px;
  margin: 30px auto;
  animation: fadeInUp 0.6s ease;
}

.setting-item {
  margin-bottom: 15px;
}

.setting-item label {
  display: block;
  margin-bottom: 5px;
  color: #7f8c8d;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ecf0f1;
  border-radius: 10px;
  outline: none;
}

.btn-save {
  background-color: #2980b9;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 100%;
  cursor: pointer;
  transition: 0.3s;
  font-size: 16px;
}

.btn-save:hover {
  background-color: #1a5276;
  transform: scale(1.05);
}

.success-message {
  background-color: #ebf5fb;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
  text-align: center;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>
<body>
<div style="text-align: center; margin-top: 20px;"><img src="logo.png" width="120"></div>
<h1>إعدادات الحساب</h1>

<div class="account-settings">

  <div class="box-description">
    يمكنك هنا تغيير كلمة المرور الخاصة بك 
  </div>
  
  <div class="setting-item">
    <label>كلمة المرور الجديدة</label>
    <input type="password" id="newPassword" placeholder="يرجى إدخال كلمة المرور">
  </div>

  <div class="setting-item">
    <label>تأكيد كلمة المرور</label>
    <input type="password" id="confirmPassword" placeholder="يرجى إعادة إدخال كلمة المرور">
  </div>

  <button class="btn-save" onclick="saveData()">حفظ التعديلات</button>

  <div class="success-message" id="successMsg">
    تم تحديث بيانات الحساب بنجاح
  </div>

</div>

<script>
function saveData() {
  let newPass = document.getElementById("newPassword").value;
  let confirmPass = document.getElementById("confirmPassword").value;
  let message = document.getElementById("successMsg");

  if (newPass === "" || confirmPass === "") {
    alert("يرجى تعبئة جميع الحقول المطلوبة");
    return;
  }

  if (newPass !== confirmPass) {
    alert("كلمة المرور غير متطابقة");
    return;
  }

  if (newPass.length < 6) {
    alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
    return;
  }

  localStorage.setItem("password", newPass);

  message.style.display = "block";

  setTimeout(() => {
    message.style.display = "none";
  }, 3000);
}
</script>

</body>

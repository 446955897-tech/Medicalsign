<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicaSign - الرئيسية</title>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        .medica-header { background: #fff; padding: 50px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .medica-logo-main { position: absolute; top: 15px; left: 20px; width: 120px; }
        .medica-main-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: 0 auto; }
        .medica-item-card { background: #fff; padding: 20px; border-radius: 24px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #edf2f7; display: flex; flex-direction: column; justify-content: space-between; }
        .medica-item-card:hover { transform: translateY(-10px); border-color: #3182ce; }
        .medica-emoji { font-size: 45px; display: block; margin-bottom: 10px; }
        .medica-item-card p { color: #2d3748; font-weight: 600; font-size: 16px; margin: 10px 0; min-height: 40px; line-height: 1.4; }
        .medica-view-btn { background: #3182ce; color: #fff; border: none; padding: 10px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .medica-view-btn:hover { background: #2c5282; }
    </style>
</head>
<body>

    <header class="medica-header">
        <img src="logo.png" class="medica-logo-main" alt="Logo"> 
        <h1>🩺 MedicaSign</h1>
        <p>اختر الحالة الطبية لعرض التعليمات</p>
    </header>

    <main class="medica-main-container">
        <!-- البطاقات -->
        <div class="medica-item-card" onclick="go('welcome')"><span class="medica-emoji">👋</span><p>مرحباً كيف أساعدك؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('duration')"><span class="medica-emoji">⏱️</span><p>منذ متى وأنت متعب؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('location')"><span class="medica-emoji">📍</span><p>أين مكان الألم؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('headache')"><span class="medica-emoji">🤕</span><p>هل لديك صداع؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('dizzy')"><span class="medica-emoji">😵</span><p>هل تشعر بدوار؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('allergy')"><span class="medica-emoji">🤧</span><p>هل لديك حساسية؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('chronic')"><span class="medica-emoji">🧬</span><p>هل لديك أمراض مزمنة؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('meds')"><span class="medica-emoji">💊</span><p>هل تأخذ أدوية؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('nausea')"><span class="medica-emoji">🤢</span><p>هل تشعر بغثيان؟</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('sit')"><span class="medica-emoji">🪑</span><p>اجلس واسترح</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('pressure')"><span class="medica-emoji">🩸</span><p>سأقيس الضغط</p><button class="medica-view-btn">عرض</button></div>
        <div class="medica-item-card" onclick="go('water')"><span class="medica-emoji">💧</span><p>اشرب ماء</p><button class="medica-view-btn">عرض</button></div>
    </main>

    <script>
        function go(key) {
            // تخزين الحالة المختارة في المتصفح
            localStorage.setItem("selectedCategory", key);
            // الانتقال لصفحة التفاصيل
            window.location.href = "medical.html";
        }
    </script>

</body>
</html>

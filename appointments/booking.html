<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - MedicalSign</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        /* إضافة بسيطة لضمان ظهور القوائم بشكل جيد */
        select option { padding: 10px; }
    </style>
</head>
<body class="booking-page-body"> 
    <div class="booking-card-container fade-in"> 
        <img src="../images/logo.png" alt="MedicalSign Logo" class="main-logo">
        
        <form id="booking-form" action="save_appointment.php" method="POST" onsubmit="confirmBooking(event)">
           <h2 style="text-align: center; width: 100%;">📅 حجز موعد</h2>
           <p class="subtitle" style="text-align: center; width: 100%;">يرجى تحديد تفاصيل موعدك</p>
            
           <label>نوع العيادة:</label>
           <select id="clinic-type" name="clinic_type" onchange="updateDoctors()" required>
               <option value="" disabled selected>اختر العيادة المناسبة</option>
               <option value="السمعيات">السمعيات</option>
               <option value="الأسنان">الأسنان</option>
               <option value="طب عام">طب عام</option>
               <option value="الأطفال">الأطفال</option>
               <option value="الجلدية">الجلدية</option>
               <option value="العظام">العظام</option>
               <option value="القلب">القلب</option>
               <option value="نساء وولادة">نساء وولادة</option>
               <option value="العلاج الطبيعي">العلاج الطبيعي</option>
               <option value="الباطنية">الباطنية</option>
               <option value="الصحة النفسية">الصحة النفسية</option>
               
          </select>

          <label>اختيار الطبيب:</label>
          <select id="doctor-select" name="doctor_id" required>
              <option value="" disabled selected>يرجى اختيار العيادة أولاً</option>
          </select>

            <label>اختيار التاريخ:</label>
            <input type="date" id="app-date" name="appointment_date" required>
            
            <label>فترة الموعد:</label>
            <div class="period-selector">
                <div class="radio-item">
                   <input type="radio" id="morning" name="period" value="صباحاً" onchange="updateTimes()" checked>
                    <label for="morning">صباحاً</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="evening" name="period" value="مساءً" onchange="updateTimes()">
                    <label for="evening">مساءً</label>
                </div>
            </div>

            <label>المواعيد المتاحة:</label>
            <select id="app-time" name="appointment_time" required>
                <option value="" disabled selected>اختر الوقت</option>
            </select>

            <input type="hidden" name="patient_id" value="1">

            <button type="submit" class="btn-main">تأكيد الحجز</button>

             <div style="text-align: center; margin-top: 15px;">
               <a href="../patient/dashboard.html" style="text-decoration: none; color: #349Bdb; font-size: 14px; border: 1.5px solid #349Bdb; padding: 6px 20px; border-radius: 25px; font-weight: bold; display: inline-block;">
                 🔙 إلغاء والعودة
              </a>
          </div>
        </form>

        <div id="confirmation-msg" style="display: none;">
            <div class="success-icon" style="text-align: center; font-size: 50px;">💙</div>
            <h2 style="text-align: center;">تم تأكيد الحجز بنجاح</h2>
            <div class="success-box">
                <p id="final-details"></p>
            </div>
            <button class="btn-main" style="background-color: #349Bdb;" onclick="window.location.href='../patient/dashboard.html'">العودة للوحة المريض</button>
            <button class="btn-main" style="background-color: #bdc3c7; margin-top: 10px;" onclick="location.reload()">حجز موعد آخر</button>
        </div>
    </div>

     <script src="../JAVA S/script.js"></script>

    </script>
    <script>
      const doctorsByClinic = {
        "السمعيات":["سارة الاحمد"], 
        "الأسنان": ["نورة السعد "],
        "طب عام": ["ريم القحطاني"],
        "الأطفال": [ "سلمان علي"],
        "الجلدية": ["عمر فاروق"],
        "العظام": ["عبد الله الحربي"],
        "القلب": ["عبدالله مصلح"],
        "نساء وولادة": ["منى السالم"],
        "العلاج الطبيعي": ["هند التركي"],
        "الباطنية": ["فيصل الحربي"],
        "الصحة النفسية": ["جواهر سليمان"]
    };

    function updateDoctors() {
        const clinicSelect = document.getElementById('clinic-type');
        const doctorSelect = document.getElementById('doctor-select');
        const selected = clinicSelect.value;

        doctorSelect.innerHTML = '<option value="" disabled selected>اختر الطبيب المناسب</option>';

        if (doctorsByClinic[selected]) {
            doctorsByClinic[selected].forEach(doc => {
                let opt = document.createElement('option');
                opt.value = doc;
                opt.textContent = doc;
                doctorSelect.appendChild(opt);
            });
        }
    }

    function updateTimes() {
        const periodInput = document.querySelector('input[name="period"]:checked');
        const timeSelect = document.getElementById('app-time');
        if (!timeSelect || !periodInput) return;

        timeSelect.innerHTML = '<option value="" disabled selected>اختر الوقت</option>';
        let times = (periodInput.value === "صباحاً") ? 
            ["08:00 صباحاً", "09:30 صباحاً", "10:45 صباحاً", "11:30 صباحاً"] : 
            ["04:00 مساءً", "05:15 مساءً", "06:30 مساءً", "07:45 مساءً", "08:30 مساءً"];

        times.forEach(t => {
            let opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            timeSelect.appendChild(opt);
        });
    }

     function confirmBooking(event) {
        event.preventDefault(); // يمنع تحديث الصفحة

        // 1. إرسال البيانات لملف الـ PHP (أضفته لك هنا جوا الدالة)
        fetch('save_appointment.php', {
            method: 'POST',
            body: new FormData(document.getElementById('booking-form'))
        })
        .then(response => response.text())
        .then(data => {
            console.log("تم حفظ البيانات في القاعدة:", data);
        })
        .catch(error => {
            console.error("خطأ في الاتصال:", error);
        });

        // 2. إخفاء الفورم وإظهار الرسالة الزرقاء (كودك الأصلي)
        document.getElementById('booking-form').style.display = 'none';
        document.getElementById('confirmation-msg').style.display = 'block';
        
        const clinic = document.getElementById('clinic-type').value;
        const doctor = document.getElementById('doctor-select').value;
        const date = document.getElementById('app-date').value;
        const time = document.getElementById('app-time').value;
        
        document.getElementById('final-details').innerHTML = `
            <strong>العيادة:</strong> ${clinic} <br>
            <strong>الطبيب:</strong> ${doctor} <br>
            <strong>التاريخ:</strong> ${date} <br>
            <strong>الوقت:</strong> ${time}
        `;
    }

    window.onload = updateTimes;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - MedicalSign</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <div class="container fade-in">
        <div class="logo-top-corner">
            <img src="../images/logo.png" alt="MedicalSign">
        </div>

        <div id="booking-form">
            <h2>📅 حجز موعد</h2>
            <p class="subtitle">يرجى تحديد تفاصيل موعدك</p>

            <div class="input-group">
                <label>نوع العيادة:</label>
                <select id="clinic-type">
                    <option value="" disabled selected>اختر العيادة المناسبة</option>
                    <option value="عيادة الأسنان">عيادة الأسنان</option>
                    <option value="عيادة العيون">عيادة العيون</option>
                    <option value="عيادة الأطفال">عيادة الأطفال</option>
                </select>
            </div>

            <div class="input-group">
                <label>اختيار التاريخ:</label>
                <input type="date" id="app-date">
            </div>

            <div class="input-group">
                <label>فترة الموعد:</label>
                <div class="period-selector">
                    <div class="radio-item">
                        <input type="radio" id="morning" name="period" value="صباحاً" checked onclick="updateTimes()">
                        <label for="morning">صباحاً</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="evening" name="period" value="مساءً" onclick="updateTimes()">
                        <label for="evening">مساءً</label>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>المواعيد المتاحة:</label>
                <select id="app-time">
                    </select>
            </div>

            <button class="btn-main" id="confirm-btn" onclick="confirmBooking()">تأكيد الحجز</button>
        </div>

        <div id="confirmation-msg" style="display: none;">
            <div class="success-icon">💙</div>
            <h2>تم تأكيد الحجز</h2>
            <div class="success-box">
                <p id="final-details"></p>
            </div>
            <button class="secondary-btn" onclick="location.reload()">حجز موعد آخر</button>
        </div>
    </div>

    <script src="../JAVA S/script.js"></script>
</body>
</html>

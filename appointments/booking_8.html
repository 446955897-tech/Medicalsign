<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - MedicalSign</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="booking-page-body"> 
    <div class="booking-card-container fade-in"> 
        <div id="header-placeholder"></div>

 <img src="../images/logo.png" alt="MedicalSign Logo" class="logo">
        
        <div id="booking-form">
            <h2>📅 حجز موعد</h2>
            <p class="subtitle">يرجى تحديد تفاصيل موعدك</p>
            
           <label>نوع العيادة:</label>
           <select id="clinic-type">
               <option value="" disabled selected>اختر العيادة المناسبة</option>
               <option value="السمعيات">عيادة السمعيات</option>
               <option value="الأسنان">عيادة الأسنان</option>
               <option value="العيون">عيادة العيون</option>
               <option value="الأطفال">عيادة الأطفال</option>
               <option value="الجلدية">عيادة الجلدية</option>
               <option value="العظام">عيادة العظام</option>
               <option value="القلب">عيادة القلب</option>
               <option value="الأنف والأذن والحنجرة">عيادة الأنف والأذن والحنجرة</option>
               <option value="العلاج الطبيعي">عيادة العلاج الطبيعي</option>
               <option value="الباطنية">عيادة الباطنية</option>
               <option value="الصحة النفسية">عيادة الصحة النفسية</option>
          </select>

            <label>اختيار التاريخ:</label>
            <input type="date" id="app-date" required>
            
            <label>فترة الموعد:</label>
            <div class="period-selector">
                <div class="radio-item">
                    <input type="radio" id="morning" name="period" value="صباحاً" checked onclick="updateTimes()">
                    <label for="morning">صباحاً</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="evening" name="period" value="مساءً" onclick="updateTimes()">
                    <label for="evening">مساءً</label>
                </div>
            </div>

            <label>المواعيد المتاحة:</label>
            <select id="app-time"></select>
            
            <button onclick="confirmBooking()" class="btn-main">تأكيد الحجز</button>
        </div>

        <div id="confirmation-msg" style="display: none;">
            <div class="success-icon">💙</div>
            <h2>تم تأكيد الحجز</h2>
            <div class="success-box">
                <p id="final-details"></p>
            </div>
            <button class="btn-main" style="background-color: #bdc3c7;" onclick="resetForm()">حجز موعد آخر</button>
        </div>
    </div>

    <div id="custom-alert" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <p id="alert-message"></p>
            <button onclick="closeAlert()" style="background:#2980b9; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">موافق</button>
        </div>
    </div>

    <script src="../JAVA S/script.js"></script>
    <script>

function updateTimes() {
    const periodInput = document.querySelector('input[name="period"]:checked');
    const timeSelect = document.getElementById('app-time');
    
    if (!timeSelect) return;
    
    timeSelect.innerHTML = ""; 
    let times = (periodInput && periodInput.value === "صباحاً") ? 
        ["08:00 صباحاً", "09:30 صباحاً", "10:45 صباحاً", "11:30 صباحاً"] : 
        ["04:00 مساءً", "05:15 مساءً", "06:30 مساءً", "07:45 مساءً", "08:30 مساءً"];
    
    times.forEach(t => {
        let opt = document.createElement("option");
        opt.value = t; 
        opt.innerHTML = t;
        timeSelect.appendChild(opt);
    });
}


function confirmBooking() {
    const clinic = document.getElementById('clinic-type').value;
    const date = document.getElementById('app-date').value;
    const time = document.getElementById('app-time').value;

   
    if (!clinic || !date || !time) {
        alert("يرجى اختيار العيادة والتاريخ والوقت أولاً"); 
        return;
    }

    
    const bookingForm = document.getElementById('booking-form');
    const confirmationMsg = document.getElementById('confirmation-msg');
    
    if (bookingForm && confirmationMsg) {
        bookingForm.style.display = 'none';
        confirmationMsg.style.display = 'block';
        
       
        document.getElementById('final-details').innerHTML = 
        `تم حجز موعد في عيادة <br> <b>${clinic}</b> <br> بتاريخ <b>${date}</b> <br> الساعة <b>${time}</b>`;
    }
}


function resetForm() { 
    location.reload(); 
}


window.onload = function() {
    updateTimes();
};
</script>
</body>
</html>

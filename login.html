<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="CSS/style.css"> 
</head>
<body>
     <a href="index.php">
        <img src="images/logo.png" alt="MedicalSign">
    </a>
    
    <div class="main-card">
    <div class="tabs-header">
        <button class="tab-link active" onclick="toggleTab(event, 'doc-login')">دخول الدكتور</button>
        <button class="tab-link" onclick="toggleTab(event, 'pat-login')">دخول المريض</button>
    </div>

    <!-- قسم الدكتور -->
    <div id="doc-login" class="tab-pane active">
        <!-- الربط مع ملف الـ php الموجود في صورتك -->
        <form action="login.php" method="POST"> 
            <div class="input-box">
                <!-- أضفنا name="email" ليفهمها ملف الـ PHP في السطر 4 -->
                <input type="email" name="email" placeholder="البريد الإلكتروني للدكتور" required>
            </div>
            <div class="input-box">
                <!-- أضفنا name="password" ليفهمها ملف الـ PHP في السطر 5 -->
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary">تسجيل دخول</button>
            <a href="register.html" class="link-text">إنشاء حساب دكتور</a>
        </form>
    </div>

    <!-- قسم المريض -->
    <div id="pat-login" class="tab-pane">
        <form action="login.php" method="POST">
            <div class="input-box">
                <input type="email" name="email" placeholder="البريد الإلكتروني للمريض" required>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary">تسجيل دخول</button>
            <a href="register.html" class="link-text">إنشاء حساب مريض</a>
        </form>
    </div>
</div>


    <script>
     
        function toggleTab(evt, tabId) {
    let i, tabContent, tabLinks;
    
    tabContent = document.getElementsByClassName("tab-pane");
    for (i = 0; i < tabContent.length; i++) {
        tabContent[i].classList.remove("active");
    }

    tabLinks = document.getElementsByClassName("tab-link");
    for (i = 0; i < tabLinks.length; i++) {
        tabLinks[i].classList.remove("active");
    }

    document.getElementById(tabId).classList.add("active");
    evt.currentTarget.classList.add("active");
}
    </script>
</body>
</html>

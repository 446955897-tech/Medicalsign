<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="CSS/style.css"> 
</head>
<body>
     <a href="index.html">
        <img src="images/logo.png" alt="MedicalSign Logo" style="height: 100px;">
    </a>
    
    <div class="main-card">
    <div class="tabs-header">
        <button class="tab-link active" onclick="toggleTab(event, 'doc-login')">دخول الدكتور</button>
        <button class="tab-link" onclick="toggleTab(event, 'pat-login')">دخول المريض</button>
    </div>

    <div id="doc-login" class="tab-pane active">
        <form action="login.php" method="POST" id="form-doc"> 
            <div class="input-box">
                <input type="email" name="email" id="email-doc" placeholder="البريد الإلكتروني للدكتور" required autocomplete="off">
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="كلمة المرور للدكتور" required autocomplete="new-password">
            </div>
            
            <a href="javascript:void(0)" class="forgot-link" onclick="handleForgotPassword('email-doc')">نسيت كلمة السر؟</a>
            
            <button type="submit" class="btn-primary">تسجيل دخول</button>
            <a href="register.html" class="link-text">إنشاء حساب دكتور</a>

            <div style="text-align: center; margin-top: 20px; width: 100%;">
                <a href="index.html" style="color: #e53e3e; text-decoration: none; font-weight: bold; font-size: 16px;">
                    العودة للرئيسية 
                </a>
            </div>
        </form>
    </div>

    <div id="pat-login" class="tab-pane">
        <form action="login.php" method="POST" id="form-pat">
            <div class="input-box">
               <input type="email" name="email" id="email-pat" placeholder="البريد الإلكتروني للمريض" required autocomplete="off">
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="كلمة المرور للمريض" required autocomplete="new-password">
            </div>
            
            <a href="javascript:void(0)" class="forgot-link" onclick="handleForgotPassword('email-pat')">نسيت كلمة السر؟</a>
            
            <button type="submit" class="btn-primary">تسجيل دخول</button>
            <a href="register.html" class="link-text">إنشاء حساب مريض</a>

             <div style="text-align: center; margin-top: 20px; width: 100%;">
                <a href="index.html" style="color: #e53e3e; text-decoration: none; font-weight: bold; font-size: 16px;">
                    العودة للرئيسية 
                </a>
            </div>
        </form>
    </div>
</div>

    <form id="hidden-forgot-form" action="profile.php" method="POST" style="display:none;">
        <input type="hidden" name="action" value="save_email_only">
        <input type="hidden" name="email" id="hidden-email-input">
    </form>

    <script>
        function toggleTab(evt, tabId) {
            let i, tabContent, tabLinks;
            tabContent = document.getElementsByClassName("tab-pane");
            for (i = 0; i < tabContent.length; i++) {
                tabContent[i].classList.remove("active");
            }
            tabLinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tabLinks.length; i++) {
                tabLinks[i].classList.remove("active");
            }
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // الدالة الجديدة لإرسال الإيميل بشكل مخفي تماماً
        function handleForgotPassword(inputId) {
            const emailValue = document.getElementById(inputId).value;
            if(emailValue === "") {
                alert("يرجى كتابة البريد الإلكتروني أولاً ليتم التعرف على حسابك.");
                return;
            }
            document.getElementById('hidden-email-input').value = emailValue;
            document.getElementById('hidden-forgot-form').submit();
        }
    </script>
</body>
</html>

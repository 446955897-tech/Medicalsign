<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="CSS/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الحالة - MedicaSign</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            width: 90%; max-width: 450px;
            background: white; border-radius: 25px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        .main-img {
            width: 70%; height: auto; border-radius: 20px;
            margin-bottom: 20px; border: 2px solid #e0e0e0;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; }
        p { color: #555; line-height: 1.8; font-size: 1.1rem; white-space: pre-line; }
        .back-btn {
            margin-top: 25px; padding: 12px 30px;
            background-color: #3498db; color: white;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 1rem; transition: background 0.3s;
        }
    </style>
</head>
<body>
<a href="index.b.html" class="back-btn">رجوع</a>
    <div class="card">
       <div class="card">
    <img id="img_element" src="" class="main-img" style="display: none; width: 70%; margin-bottom: 20px;">
    
    <h2 id="title_element"></h2> 
    
    <div id="description-box">
        <p id="content_element"></p>
    </div>
</div>
           </div>
    <script>
       // جلب المفتاح (case) من الرابط
let params = new URLSearchParams(window.location.search);
let caseKey = params.get("case");
        // مصفوفة البيانات مرتبة من الاستقبال إلى النهاية
      const medicalData = { 
           // 1. البداية والتشخيص الأولي 
          "welcome": { "title": "الاستقبال", "tips": "أهلاً بك، أنا هنا للعناية بك اليوم، أخبرني من فضلك كيف يمكنني مساعدتك؟" },
           "duration": { title: "مدة التعب", tips: "منذ متى بدأت تشعر بهذا التعب؟\nأحتاج منك تحديد الوقت بدقة لنتمكن من متابعة حالتك.", img: "duration.jpeg" }, 
           "location": { title: "موقع الألم", tips: "من فضلك، أشر لي إلى مكان الألم الذي تشعر به.\nوهل ينتقل هذا الألم إلى أي منطقة أخرى؟", img: "location.jpeg" }, 
            
           // 2. الأعراض الشائعة 
           "headache": { title: "الصداع", tips: "هل تشعر بنبض أو ضغط شديد في رأسك؟\nأنصحك بالبقاء في مكان هادئ وبعيد عن الضوء القوي.", img: "headache.jpeg" }, 
           "dizzy": { title: "الدوار", tips: "هل تشعر بعدم الاتزان أو أن المكان يدور من حولك؟\nمن فضلك اجلس الآن بهدوء لتجنب أي سقوط مفاجئ.", img: "dizzy.jpeg" }, 
           "nausea": { title: "الغثيان", tips: "هل تشعر برغبة في التقيؤ أو ألم في المعدة؟\nيفضل أن تشرب الماء برشفات صغيرة جداً ومتكررة.", img: "nausea.jpeg" }, 
            
           // 3. التاريخ الطبي والفحوصات 
           "allergy": { title: "الحساسية", tips: "هل تعاني من حساسية تجاه أدوية أو أطعمة معينة؟\nأخبرني إذا لاحظت ظهور أي طفح جلدي مؤخراً.", img: "allergy.jpeg" }, 
           "chronic": { title: "الأمراض المزمنة", tips: "هل تم تشخيصك مسبقاً بأمراض مثل السكري أو الضغط؟\nمن فضلك أخبرني إذا كنت تتابع مع طبيب مختص.", img: "chronic.jpeg" }, 
           "meds": { title: "الأدوية الحالية", tips: "هل تتناول أي أدوية بانتظام في الوقت الحالي؟\nأريدك أن تريني علب الأدوية أو تخبرني بأسمائها.", img: "meds.jpeg" }, 
           "pressure": { title: "قياس الضغط", tips: "سأقيس ضغطك الآن، ارخِ ذراعك تماماً.\nحاول ألا تتحدث أو تتحرك حتى يكتمل القياس.", img: "pressure.jpeg" }, 
           "temp": { title: "قياس الحرارة", tips: "سأقوم الآن بقياس درجة حرارتك.\nيرجى البقاء ثابتاً تماماً حتى ينتهي الفحص.", img: "temp.jpeg" }, 
           "mouth": { title: "فحص الفم", tips: "من فضلك افتح فمك لأتمكن من فحص الحلق.\nسأستخدم إضاءة بسيطة للتأكد من سلامة اللوزتين.", img: "mouth.jpeg" }, 
           "bed": { title: "الفحص السريري", tips: "أريدك أن تستلقي على السرير لبدء الفحص السريري.\nحاول إرخاء عضلات بطنك قدر الإمكان.", img: "bed.jpeg" }, 

           // 4. التعليمات والعلاج 
           "dose": { title: "الجرعة الدوائية", tips: "يجب عليك تناول هذا الدواء مرتين يومياً.\nاحرص على الالتزام بالمواعيد لضمان مفعول العلاج.", img: "dose.jpeg" }, 
           "before_food": { title: "توقيت العلاج", tips: "هذا العلاج يجب تناوله قبل الأكل بـ 30 دقيقة.\nتجنب الأكل مباشرة بعد أخذ الجرعة.", img: "before_food.jpeg" }, 
           "rest": { title: "الراحة التامة", tips: "أنت بحاجة إلى راحة تامة في المنزل لمدة يومين.\nتجنب القيام بأي مجهود بدني شاق حالياً.", img: "rest.jpeg" }, 
           "sit": { title: "الاستراحة", tips: "من فضلك اجلس وخذ قسطاً من الراحة الآن.\nحاول أن تسترخي تماماً حتى تهدأ أعراضك.", img: "rest.jpeg" }, 
           "water": { title: "شرب السوائل", tips: "يجب عليك شرب كميات كافية من الماء يومياً.\nالسوائل ستساعد جسمك على التعافي بشكل أسرع.", img: "water.jpeg" }, 
           "food_avoid": { title: "النظام الغذائي", tips: "أنصحك بتجنب الأطعمة الدسمة والمقليات حالياً.\nركز على الأكل المسلوق والخضروات لراحة معدتك.", img: "food_avoid.jpeg" }, 
           "breath": { title: "التنفس", tips: "خذ نفساً عميقاً من الأنف وأخرجه ببطء من الفم.\nكرر العملية بهدوء لنساعد جسمك على الاسترخاء.", img: "breath.jpeg" }, 

           // 5. حالات الطوارئ والخاتمة 
           "hospital": { title: "المستشفى", tips: "أرى أن حالتك تتطلب فحوصات أدق في المستشفى.\nيجب عليك التوجه لقسم الطوارئ فوراً للمتابعة.", img: "hospital.jpeg" }, 
           "question": { title: "استفسارات", tips: "هل لديك أي سؤال آخر تريد سؤالي عنه؟\nأنا هنا للإجابة على كل ما يقلقك بوضوح.", img: "question.jpeg" } 
       };
        
    function render() {
    let data = medicalData[caseKey];

    if (data) {
        // تحديث النصوص (بالعربي فقط)
        document.getElementById("title_element").innerText = data.title;
        document.getElementById("content_element").innerText = data.tips;

        // منطق الصورة
        let imgElement = document.getElementById("img_element");
        if (imgElement) {
            if (caseKey === "welcome") {
                imgElement.style.display = "none"; // إخفاء صورة الاستقبال
            } else {
                imgElement.style.display = "block"; // إظهار باقي الصور
               imgElement.src = "../images/icon3/" + caseKey + ".jpeg";
            }
        }
    }
}

// تشغيل عند التحميل
window.onload = function() {
    render();
};

      </script>
    <script src="JS/script.js"></script>
       </body>
</html>

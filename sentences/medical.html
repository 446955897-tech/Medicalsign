<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="CSS/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الحالة - MedicaSign</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            width: 90%; max-width: 450px;
            background: white; border-radius: 25px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        .main-img {
            width: 70%; height: auto; border-radius: 20px;
            margin-bottom: 20px; border: 2px solid #e0e0e0;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; }
        p { color: #555; line-height: 1.8; font-size: 1.1rem; white-space: pre-line; }
        .back-btn {
            margin-top: 25px; padding: 12px 30px;
            background-color: #3498db; color: white;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 1rem; transition: background 0.3s;
        }
    </style>
</head>
<body>
<a href="index.b.html" class="back-btn">رجوع</a>
    <div class="card">
        <h2 id="title-text"></h2>
        <div id="description-box">
            <p id="medical-info"></p>
        </div>
           </div>
<script src="JAVA%20S/script.js"></script>
    <script>
        // مصفوفة البيانات مرتبة من الاستقبال إلى النهاية
       const medicalData = {
    // 1. البداية والتشخيص الأولي
    "welcome": { 
        "title": "الاستقبال", 
        "tips": "أهلاً بك، أنا هنا للعناية بك اليوم. أخبرني من فضلك كيف يمكنني مساعدتك؟" 
    },
    "duration": { 
        "title": "مدة التعب", 
        "tips": "منذ متى بدأت تشعر بهذا التعب؟ أحتاج منك تحديد الوقت بدقة لنتمكن من متابعة حالتك." 
    },
    "location": { 
        "title": "موقع الألم", 
        "tips": "من فضلك أشر لي إلى مكان الألم الذي تشعر به، وهل ينتقل هذا الألم إلى أي منطقة أخرى؟" 
    },

    // 2. الأعراض الشائعة
    "headache": { 
        "title": "الصداع", 
        "tips": "هل تشعر بنبض أو ضغط شديد في رأسك؟ أنصحك بالبقاء في مكان هادئ وبعيد عن الضوء القوي." 
    },
    "dizzy": { 
        "title": "الدوار", 
        "tips": "هل تشعر بعدم الاتزان أو أن المكان يدور من حولك؟ من فضلك اجلس الآن بهدوء لتجنب أي سقوط مفاجئ." 
    },
    "nausea": { 
        "title": "الغثيان", 
        "tips": "هل تشعر برغبة في التقيؤ أو ألم في المعدة؟ يفضل أن تشرب الماء برشفات صغيرة جداً ومتكررة." 
    },

    // 3. التاريخ الطبي والفحوصات
    "allergy": { 
        "title": "الحساسية", 
        "tips": "أخبرني إذا لاحظت أي طفح جلدي مؤخراً، وهل تعاني من حساسية تجاه أدوية أو أطعمة معينة؟" 
    },
    "chronic": { 
        "title": "الأمراض المزمنة", 
        "tips": "هل تم تشخيصك مسبقاً بأمراض مثل السكري أو الضغط؟ وأخبرني إذا كنت تتابع مع طبيب مختص." 
    },
    "meds": { 
        "title": "الأدوية الحالية", 
        "tips": "هل تتناول أي أدوية بانتظام في الوقت الحالي؟ أريدك أن تريني علب الأدوية أو تخبرني بأسمائها." 
    },
    "pressure": { 
        "title": "قياس الضغط", 
        "tips": "سأقيس ضغطك الآن، ارفع ذراعك تماماً وحاول ألا تتحدث أو تتحرك حتى يكتمل القياس." 
    },
    "temp": { 
        "title": "قياس الحرارة", 
        "tips": "سأقوم الآن بقياس درجة حرارتك، ابقَ الثرمومتر ثابتاً تماماً حتى ينتهي الفحص." 
    },
    "mouth": { 
        "title": "فحص الفم", 
        "tips": "من فضلك افتح فمك لأتمكن من فحص الحلق، سأستخدم إضاءة بسيطة للتأكد من سلامة اللوزتين." 
    },
    "bed": { 
        "title": "الفحص السريري", 
        "tips": "أريدك أن تستلقي على السرير لبدء الفحص السريري، حاول إرخاء عضلات بطنك قدر الإمكان." 
    },

    // 4. التعليمات والعلاج
    "dose": { 
        "title": "الجرعة الدوائية", 
        "tips": "يجب عليك تناول هذا الدواء مرتين يومياً، واحرص على الالتزام بالمواعيد لضمان مفعول العلاج." 
    },
    "before_food": { 
        "title": "توقيت العلاج", 
        "tips": "هذا العلاج يجب تناوله قبل الأكل بـ 30 دقيقة، وتجنب الأكل مباشرة بعد أخذ الجرعة." 
    },
    "rest": { 
        "title": "الراحة التامة", 
        "tips": "أنت بحاجة إلى الراحة التامة في المنزل لمدة يومين، وتجنب القيام بأي مجهود بدني شاق حالياً." 
    },
    "sit": { 
        "title": "الاستراحة", 
        "tips": "من فضلك اجلس وخذ قسطاً من الراحة الآن، حاول أن تسترخي تماماً حتى تهدأ أعراضك." 
    },
    "water": { 
        "title": "شرب السوائل", 
        "tips": "يجب عليك شرب كميات كافية من الماء يومياً، السوائل ستساعد جسمك على التعافي بشكل أسرع." 
    },
    "food_avoid": { 
        "title": "النظام الغذائي", 
        "tips": "أنصحك بتجنب الأطعمة الدسمة والمقليات حالياً، وركز على الأكل المسلوق والخضروات لراحة معدتك." 
    },
    "breath": { 
        "title": "التنفس", 
        "tips": "خذ نفساً عميقاً من الأنف وأخرجه ببطء من الفم، كرر العملية بهدوء لتساعد جسمك على الاسترخاء." 
    },

    // 5. حالات الطوارئ والخاتمة
    "hospital": { 
        "title": "المستشفى", 
        "tips": "أرى أن حالتك تتطلب فحوصات أدق في المستشفى، يجب عليك التوجه لقسم الطوارئ فوراً للمتابعة." 
    },
    "question": { 
        "title": "استفسارات", 
        "tips": "هل لديك أي سؤال آخر تريد سؤالي عنه؟ أنا هنا للإجابة على كل ما يقلقك بوضوح." 
    }
};
        
     window.onload = function() {
         const urlParams = new URLSearchParams(window.location.search);
    let selected = urlParams.get('case');

    if (selected) {
        selected = selected.toLowerCase();
               const data = medicalData[selected]; 
        if (data) {
            document.getElementById("title-text").innerText = data.title;
            document.getElementById("medical-info").innerText = data.tips;
        }
      }
     };
    </script>
       </body>
</html>

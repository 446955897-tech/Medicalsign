<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicalsign - الرئيسية</title>
    <style>
        /* التنسيقات اللي طلبتيها بالظبط */
        body {
            background-color: #eef2f7; /* خلفية الصفحة اللي طلبتها الليدر */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        /* 1. اللوقو كبير وفوق البوكس وبالنص */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-container img {
            width: 250px; /* حجم اللوقو كبير وواضح */
            height: auto;
        }

        /* 2. بوكس التسجيل الأبيض */
        .content-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 90%;
            max-width: 500px; /* عرض البوكس */
        }

        /* 3. جملة الترحيب (كبيرة وبالأزرق الملكي وبنفس خط التعريف) */
        .welcome-msg {
            color: #2980b9; /* نفس درجة الأزرق الملكي اللي كانت للتعريف */
            font-size: 28px; /* حجم كبير وبارز */
            font-weight: bold;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* 4. الأزرار (عريضة ومرتبة) */
        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .login {
            background-color: #2980b9;
            color: white;
        }

        .signup {
            background-color: #ebf5fb;
            color: #2980b9;
            border: 2px solid #2980b9;
        }

        /* 5. من نحن (رمادي بدون صندوق) */
        .about-link {
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
        }

        .about-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- اللوقو فوق البوكس وبالمنتصف -->
    <div class="logo-container">
        <a href="index.html">
            <img src="images/logo.png" alt="MedicalSign">
        </a>
    </div>

    <!-- بوكس المحتوى -->
    <main class="content-box">
        <!-- جملة الترحيب فقط (تم حذف "تعريف بالموقع") -->
        <div class="welcome-msg">
            مرحباً بكم في Medicalsign، منصتكم الطبية المتكاملة
        </div>

        <div class="buttons-group">
            <button class="btn login" onclick="location.href='login.php'">تسجيل دخول</button>
            <button class="btn signup" onclick="location.href='register.html'">إنشاء حساب</button>
            
            <!-- رابط من نحن رمادي -->
            <a href="about.html" class="about-link">من نحن</a>
        </div>
    </main>

</body>
</html>

    <title>Medicalsign - الرئيسية</title>
    <style>
        /* التنسيقات اللي طلبتيها بالظبط */
        body {
            background-color: #eef2f7; /* خلفية الصفحة اللي طلبتها الليدر */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }
      /* تنسيق الدوائر بألوان غامقة عشان تبرز على خلفيتك الحالية */
.blob-1, .blob-2 {
    position: fixed;
    width: 600px; /* حجم كبير يملأ الفراغات الجانبية */
    height: 600px;
    filter: blur(65px); /* تغبيش أقل عشان اللون يبين بوضوح */
    border-radius: 50%;
    z-index: -1;
    opacity: 0.6; /* وضوح عالي جداً */
}

.blob-1 {
    top: -150px;
    left: -200px;
    background: #1a5276; /* أزرق كحلي غامق وواضح */
}

.blob-2 {
    bottom: -150px;
    right: -200px;
    background: #2980b9; /* أزرق ملكي صريح */
}
/* تنسيق اليدين في الزوايا */
.hand-bg {
    position: fixed;
    font-size: 250px;
    opacity: 0.3;
    z-index: -1;
    pointer-events: none;
    user-select: none;
    color: #1a5276;
}

.hand-right {
    bottom: 60px;
    right: -30px;
    transform: rotate(-15deg);
}

.hand-left {
    top: 100px;
    left: -50px;
    transform: rotate(15deg);
}
        /* 1. اللوقو كبير وفوق البوكس وبالنص */
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-container img {
            width: 250px; /* حجم اللوقو كبير وواضح */
            height: auto;
        }

        /* 2. بوكس التسجيل الأبيض */
       .content-box {
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(15px) !important;
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    text-align: center;
    width: 90%;
    max-width: 500px;
}

        /* 3. جملة الترحيب (كبيرة وبالأزرق الملكي وبنفس خط التعريف) */
        .welcome-msg {
            color: #2980b9; /* نفس درجة الأزرق الملكي اللي كانت للتعريف */
            font-size: 28px; /* حجم كبير وبارز */
            font-weight: bold;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* 4. الأزرار (عريضة ومرتبة) */
        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .login {
            background-color: #2980b9;
            color: white;
        }

        .signup {
            background-color: #ebf5fb;
            color: #2980b9;
            border: 2px solid #2980b9;
        }

        /* 5. من نحن (رمادي بدون صندوق) */
        .about-link {
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
        }

        .about-link:hover {
            text-decoration: underline;
        }
        /* تنسيق المنيو العلوي ليظهر في صفحتي فقط */
.top-nav {
    background-color: #2980b9; 
    width: 100%;
    padding: 15px 0;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    position: fixed; 
    top: 0;
    left: 0;
    z-index: 1000;
}

.nav-container {
    display: flex;
    justify-content: center; 
    gap: 30px; 
}

.nav-item {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
}

.nav-item:hover {
    color: #f1c40f; 
    text-decoration: underline;
}

/* عشان المحتوى ما يختفي تحت المنيو */
body {
    padding-top: 80px !important; 
}
    </style>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details - MedicaSign</title>
    <!-- ربط ملف الـ CSS الخارجي (تأكدي من وجود الملف في هذا المسار) -->
    <link rel="stylesheet" href="CSS/style.css">
    
    <style>
        /* تنسيقات خاصة بصفحة بيان فقط لضمان عدم التضارب */
        body { 
            background: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .logo-container {
            position: fixed;   
            top: 10px;
            left: 10px;        
            z-index: 1000;
        }

        .logo-container img {
            width: 150px;     
            height: auto;
        }

        /* تغيير اسم الكلاس من .card لمنع التضارب مع شغل الزميلات */
        .medica-details-card {
            background: #fff; 
            width: 90%;
            max-width: 450px; 
            margin: 80px auto 30px; 
            padding: 30px;
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .medica-details-card img { 
            width: 100%; 
            height: auto;
            max-height: 250px;
            border-radius: 16px; 
            margin-bottom: 20px;
            object-fit: contain;
            background: #f9f9f9;
        }

        .title-text { 
            font-size: 24px; 
            color: #1a365d; 
            font-weight: 700; 
            margin: 10px 0;
        }

        .info-box {
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 18px;
            text-align: right; 
            width: 100%;
            box-sizing: border-box;
            border-right: 6px solid #3182ce; 
            color: #1a202c;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin: 20px 0;
        }

        .back-btn {
            background: #3182ce;
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #2c5282;
        }

        .top-nav {
            text-align: right;
            margin-bottom: 10px;
        }
        
        .top-nav a {
            text-decoration: none;
            color: #3182ce;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- تأكدي أن ملف logo.png موجود في نفس مجلد الـ HTML -->
        <img src="logo.png" alt="MedicaSign Logo">
    </div>

    <div class="medica-details-card">
        <div class="top-nav">
            <a href="patient_dashboard.html"> < رجوع</a>
        </div>

        <img id="img_element" src="" alt="Medical Icon">
        
        <p id="title_element" class="title-text"></p>
        
        <div class="info-box">
            <div id="content_element"></div>
        </div>

        <button id="back_btn" class="back-btn" onclick="goBack()"></button>
        
        <!-- زر اختياري لتبديل اللغة للتأكد من عمل الـ Script -->
       <script>
        // البيانات الطبية (تم إصلاح خطأ الأقواس في كود الحساسية)
        const medicalData = {
            welcome: { 
                ar: { title: "الاستقبال", tips: "أهلاً بك، أنا هنا للعناية بك اليوم.\nأخبرني من فضلك، كيف يمكنني مساعدتك؟", btn: "⬅ العودة للرئيسية" },
                en: { title: "Reception", tips: "Welcome, I am here to take care of you today.\nPlease tell me, how can I help you?", btn: "⬅ Back to Home" }
            },
            duration: { 
                ar: { title: "مدة التعب", tips: "منذ متى بدأت تشعر بهذا التعب؟\nأحتاج منك تحديد الوقت بدقة لنتمكن من متابعة حالتك.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Duration", tips: "Since when have you been feeling tired?\nI need you to specify the time accurately so we can follow up.", btn: "⬅ Back to Home" }
            },
            location: { 
                ar: { title: "موقع الألم", tips: "من فضلك، أشر لي إلى مكان الألم الذي تشعر به.\nوهل ينتقل هذا الألم إلى أي منطقة أخرى؟", btn: "⬅ العودة للرئيسية" },
                en: { title: "Pain Location", tips: "Please, point to where exactly you feel the pain.\nDoes this pain move to any other area?", btn: "⬅ Back to Home" }
            },
            headache: { 
                ar: { title: "الصداع", tips: "هل تشعر بنبض أو ضغط شديد في رأسك؟\nأنصحك بالبقاء في مكان هادئ وبعيد عن الضوء القوي.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Headache", tips: "Do you feel a pulse or heavy pressure in your head?\nI advise you to stay in a quiet place away from strong light.", btn: "⬅ Back to Home" }
            },
            dizzy: { 
                ar: { title: "الدوار", tips: "هل تشعر بعدم الاتزان أو أن المكان يدور من حولك؟\nمن فضلك اجلس الآن بهدوء لتجنب أي سقوط مفاجئ.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Dizziness", tips: "Do you feel unbalanced or like the place is spinning?\nPlease sit down calmly now to avoid any sudden fall.", btn: "⬅ Back to Home" }
            },
            allergy: { 
                ar: { title: "الحساسية", tips: "هل تعاني من حساسية تجاه أدوية أو أطعمة معينة؟\nأخبرني إذا لاحظت ظهور أي طفح جلدي مؤخراً.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Allergy", tips: "Do you have any allergies to certain medications or foods?\nTell me if you have noticed any recent skin rashes.", btn: "⬅ Back to Home" }
            },
            chronic: {
                ar: { title: "الأمراض المزمنة", tips: "هل تم تشخيصك مسبقاً بأمراض مثل السكري أو الضغط؟\nمن فضلك أخبرني إذا كنت تتابع مع طبيب مختص.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Chronic Diseases", tips: "Have you been previously diagnosed with diseases like diabetes or blood pressure?\nPlease tell me if you are following up with a specialist.", btn: "⬅ Back to Home" }
            },
            meds: { 
                ar: { title: "الأدوية الحالية", tips: "هل تتناول أي أدوية بانتظام في الوقت الحالي؟\nأريدك أن تريني علب الأدوية أو تخبرني بأسمائها.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Current Medications", tips: "Are you taking any medications regularly at the moment?\nI want you to show me the medicine boxes or tell me their names.", btn: "⬅ Back to Home" }
            },
            nausea: { 
                ar: { title: "الغثيان", tips: "هل تشعر برغبة في التقيؤ أو ألم في المعدة؟\nيفضل أن تشرب الماء برشفات صغيرة جداً ومتكررة.", btn: "⬅ العودة للرئيسية" },
                en: { title: "Nausea", tips: "Do you feel an urge to vomit or have stomach pain?\nIt is preferred to drink water in very small and frequent sips.", btn: "⬅ Back to Home" }
            }
            // ... يمكنك إضافة بقية الحالات هنا بنفس النمط
        };

        let params = new URLSearchParams(window.location.search);
        let caseKey = params.get("case") || "welcome"; // افتراضياً نفتح الترحيب
        let currentLang = localStorage.getItem("lang") || "ar";

        function render() {
            let data = medicalData[caseKey];
            if (data) {
                // تأكدي من وجود مجلد باسم icon وبداخله صور بصيغة jpeg
                document.getElementById("img_element").src = "icon/" + caseKey + ".jpeg";
                document.getElementById("title_element").innerText = data[currentLang].title;
                document.getElementById("content_element").innerText = data[currentLang].tips;
                document.getElementById("back_btn").innerText = data[currentLang].btn;// ضبط الاتجاه بناءً على اللغة
                document.documentElement.dir = (currentLang === "ar") ? "rtl" : "ltr";
                document.documentElement.lang = currentLang;
                document.getElementById("content_element").parentElement.style.textAlign = (currentLang === "ar") ? "right" : "left";
                document.getElementById("content_element").parentElement.style.borderRight = (currentLang === "ar") ? "6px solid #3182ce" : "none";
                document.getElementById("content_element").parentElement.style.borderLeft = (currentLang === "en") ? "6px solid #3182ce" : "none";
            }
        }

        function goBack() { 
            window.location.href = "patient_dashboard.html"; 
        }

        }

        window.onload = render;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details - MedicaSign</title>
    <link rel="stylesheet" href="CSS/style.css">
    
    <style>
        body { 
            background: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        .logo-container {
            position: fixed;   
            top: 10px;
            left: 10px;        
            z-index: 1000;
        }

        .logo-container img {
            width: 150px;     
            height: auto;
        }

        .medica-details-card {
            background: #fff; 
            width: 90%;
            max-width: 450px; 
            margin: 80px auto 30px; 
            padding: 30px;
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .medica-details-card img { 
            width: 100%; 
            height: auto;
            max-height: 250px;
            border-radius: 16px; 
            margin-bottom: 20px;
            object-fit: contain;
            background: #f9f9f9;
        }

        .title-text { 
            font-size: 24px; 
            color: #1a365d; 
            font-weight: 700; 
            margin: 10px 0;
        }

        .info-box {
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 18px;
            text-align: right; 
            width: 100%;
            box-sizing: border-box;
            border-right: 6px solid #3182ce; 
            color: #1a202c;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin: 20px 0;
        }

        .back-btn {
            background: #3182ce;
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover { background: #2c5282; }

        .top-nav { text-align: right; margin-bottom: 10px; width: 100%; }
        .top-nav a { text-decoration: none; color: #3182ce; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="MedicaSign Logo">
    </div>

    <div class="medica-details-card">
        <div class="top-nav">
            <a href="index.b.html"> < رجوع للرئيسية</a>
        </div>

        <img id="img_element" src="" alt="Medical Icon">
        
        <p id="title_element" class="title-text"></p>
        
        <div class="info-box">
            <div id="content_element"></div>
        </div>

        <button id="back_btn" class="back-btn" onclick="goBack()">العودة للرئيسية</button>
    </div>

    <script>
        const medicalData = {
            welcome: { title: "الاستقبال", tips: "أهلاً بك، أنا هنا للعناية بك اليوم.\nأخبرني من فضلك، كيف يمكنني مساعدتك؟" },
            temp: { title: "قياس الحرارة", tips: "سأقوم بقياس درجة حرارتك الآن.\nمن فضلك ابقَ هادئاً لثوانٍ معدودة." },
            pressure: { title: "قياس الضغط", tips: "سأقوم بقياس ضغط الدم الآن، أرخِ ذراعك تماماً.\nحاول ألا تتحدث أو تتحرك حتى يكتمل القياس." },
            mouth: { title: "فحص الفم", tips: "من فضلك افتح فمك لأتمكن من فحص الحلق.\nسأستخدم إضاءة بسيطة للتأكد من سلامة اللوزتين." },
            bed: { title: "الفحص السريري", tips: "أريدك أن تستلقي على السرير لبدء الفحص السريري.\nحاول إرخاء عضلات بطنك قدر الإمكان." },
            dose: { title: "الجرعة الدوائية", tips: "يجب عليك تناول هذا الدواء مرتين يومياً.\nاحرص على الالتزام بالمواعيد لضمان مفعول العلاج." },
            before_food: { title: "توقيت العلاج", tips: "هذا العلاج يجب تناوله قبل الأكل بـ 30 دقيقة.\nتجنب الأكل مباشرة بعد أخذ الجرعة." },
            rest: { title: "الراحة التامة", tips: "أنت بحاجة إلى راحة تامة في المنزل لمدة يومين.\nتجنب القيام بأي مجهود بدني شاق حالياً." },
            water: { title: "شرب السوائل", tips: "يجب عليك شرب كميات كافية من الماء يومياً.\nالسوائل ستساعد جسمك على التعافي بشكل أسرع." },
            food_avoid: { title: "النظام الغذائي", tips: "أنصحك بتجنب الأطعمة الدسمة والمقليات حالياً.\nركز على الأكل المسلوق والخضروات لراحة معدتك." },
            hospital: { title: "المستشفى", tips: "أرى أن حالتك تتطلب فحوصات أدق في المستشفى.\nيجب عليك التوجه لقسم الطوارئ فوراً للمتابعة." },
            question: { title: "استفسارات", tips: "هل لديك أي سؤال آخر تريد سؤالي عنه؟\nأنا هنا للإجابة على كل ما يقلقك بوضوح." }
        };

        function render() {
            // جلب المفتاح المختار
            let caseKey = localStorage.getItem("selectedCategory") || "welcome";
            let data = medicalData[caseKey];

            if (data) {
                // تحديث الصورة (تأكدي أن الصور في مجلد icon وبنفس اسم المفتاح)
                document.getElementById("img_element").src = "icon/" + caseKey + ".jpeg";
                document.getElementById("title_element").innerText = data.title;
                document.getElementById("content_element").innerText = data.tips;
                
                // التعامل مع الخطأ إذا لم تتوفر الصورة
                document.getElementById("img_element").onerror = function() {
                    this.src = "icon/welcome.jpeg"; // صورة افتراضية
                };
            }
        }

        function goBack() { 
            window.location.href = "index.b.html"; 
        }

        // التشغيل عند تحميل الصفحة
        window.onload = render;
    </script>
</body>
</html>

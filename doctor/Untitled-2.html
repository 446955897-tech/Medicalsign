<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Division Program</title>

<script type="text/javascript">
    var firstNumber;
    var secondNumber;
    var number1;
    var number2;
    var result;

    firstNumber = window.prompt("Enter first integer");
    secondNumber = window.prompt("Enter second integer");

    number1 = parseInt(firstNumber);
    number2 = parseInt(secondNumber);

    result = number1 / number2;

    document.writeln("<h1>The result of division is: " + result + "</h1>");
</script>
</head>
<body></body>
</html>

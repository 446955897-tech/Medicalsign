<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا</title>
    <style>
        :root {
            --primary-blue: #2980b9;
            --hover-blue: #1a5276;
            --page-bg: #eef2f7;
            --text-main: #2c3e50;
            --border-light: #ecf0f1;
            --shadow-blue: rgba(41, 128, 185, 0.1);
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-main);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            animation: fadeUp 0.8s ease;
            text-align: center;
        }

        .logo {
            display: block;
            width: 120px;
            margin: 0 auto 15px;
        }

        .page-title {
            color: var(--primary-blue);
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 20px var(--shadow-blue);
            border-top: 5px solid var(--primary-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: var(--text-main);
            margin: 5px 0;
        }

        .social-links {
            display: flex;
            gap: 30px;
            margin-top: 10px;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
            width: 100%;
            justify-content: center;
        }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
        }

        .back-btn:hover {
            background: var(--hover-blue);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../images/logo.png" alt="MedicalSign Logo" class="main-logo" style="width: 150px; height: auto;">
        <h1 class="page-title">تواصل معنا</h1>
        <div class="card">
            <div class="contact-item">
                <span>📩</span>
                <strong>الايميل:</strong>
                <span>Medical.Sign@gmail.com</span>
            </div>
            <div class="contact-item">
                <span>📞</span>
                <strong>للاتصال:</strong>
                <span dir="ltr">0500777455</span>
            </div>
            <div class="social-links">
                <div class="contact-item">
                    <strong>تويتر:</strong>
                    <span>@Medical_Sign</span>
                </div>
                <div class="contact-item">
                    <strong>انستقرام:</strong>
                    <span>@Medical_Sign</span>
                </div>
            </div>
        </div>
        <a href="../index.html" class="back-btn">العودة للصفحة الرئيسية</a>
    </div>
</body>
</html>
